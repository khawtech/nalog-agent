name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 20 = Alibaba FC custom-runtime parity, 24 = active LTS dev/Docker target.
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: NALOG_USE_DEMO=true NALOG_API_URL= AGENT_API_KEY= npm run check
      - run: npm audit --audit-level=high || true
